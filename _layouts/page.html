---
layout: default
---
<div class="page-head">
  <div class="wrap">
    {% if page.eyebrow %}<p class="page-head__eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1 class="page-head__title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-head__subtitle">{{ page.subtitle }}</p>{% endif %}
  </div>
</div>

<div class="wrap page-body">
  {{ content }}
</div>
