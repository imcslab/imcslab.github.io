# HOW TO ADD AN ITEM (from github.com, no local tools needed):
#   1. Open this file and click the pencil icon.
#   2. Copy the block below, paste it at the TOP of the list, edit the values.
#   3. Click "Commit changes". The site rebuilds within a minute or two.
