<footer class="site-footer">
  <div class="wrap site-footer__inner">
    <div class="site-footer__block">
      <h2 class="site-footer__title">{{ site.short_title }}</h2>
      <p class="site-footer__desc">{{ site.title }}<br>{{ site.tagline }}</p>
    </div>

    <div class="site-footer__block">
      <h2 class="site-footer__title">Contact</h2>
      <p class="site-footer__desc">
        {{ site.lab_address }}<br>
        Office: {{ site.office_address }}<br>
        <a href="mailto:{{ site.email }}">{{ site.email }}</a>
      </p>
    </div>

    <div class="site-footer__block">
      <h2 class="site-footer__title">Links</h2>
      <ul class="site-footer__links">
        <li><a href="{{ site.scholar_url }}">Google Scholar</a></li>
        <li><a href="{{ site.github_url }}">GitHub</a></li>
        <li><a href="{{ site.linkedin_url }}">LinkedIn</a></li>
      </ul>
    </div>
  </div>
  <div class="wrap site-footer__bottom">
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.short_title }}, Hansung University. All rights reserved.</p>
  </div>
</footer>
