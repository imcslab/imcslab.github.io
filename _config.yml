# --- Site identity -----------------------------------------------------------
title: "Intelligent Mobility and Cybersecurity Lab."
short_title: "IMCS Lab."
tagline: "Division of Computer Engineering, Hansung University"
description: >-
  The Intelligent Mobility and Cybersecurity (IMCS) Lab at Hansung University,
  directed by Prof. Seunghyun Park, researches automotive cybersecurity,
  connected and autonomous vehicles, and the security of intelligent mobility
  systems.
url: "https://imcslab.github.io"
baseurl: ""
lang: en
timezone: Asia/Seoul

# --- Contact -----------------------------------------------------------------
email: "sp@hansung.ac.kr"
lab_address: "#500, A-Engineering Bldg., Hansung University, 116 Samseongyo-ro 16-gil, Seongbuk-gu, Seoul 02876, South Korea"
office_address: "#329, Research Hall, Hansung University"
github_url: "https://github.com/imcslab"
scholar_url: "https://scholar.google.com/citations?user=qJaVNy0AAAAJ"
linkedin_url: "https://www.linkedin.com/in/seunghyunpark"

# --- Navigation --------------------------------------------------------------
# `children` renders a dropdown on desktop and an indented group on mobile.
navigation:
  - title: Home
    url: /
  - title: News
    url: /news/
  - title: Members
    url: /members/professor/
    children:
      - title: Professor
        url: /members/professor/
      - title: Students
        url: /members/students/
  - title: Publications
    url: /publications/
  - title: Research
    url: /research/
  - title: Projects
    url: /projects/

# --- Build -------------------------------------------------------------------
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
